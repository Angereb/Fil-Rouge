<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Inscription</h1>
    </div>
</div>


<div class="container">
    <form>
        <div class="mb-3">
            <label for="NomInput" class="form-label">nom :</label>
            <input type="text" class="form-control" id="NomInput">
        </div>
        <div class="mb-3">
            <label for="PrenomInput" class="form-label">Prénom :</label>
            <input type="text" class="form-control" id="PrenomInput">
        </div>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email :</label>
            <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr">
        </div>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Mot de Passe :</label>
            <input type="password" class="form-control" id="PasswordInput">
        </div>
        <div class="mb-3">
            <label for="PasswordValid" class="form-label">Validez votre mot de passe :</label>
            <input type="password" class="form-control" id="PasswordValid">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Inscription</button>
        </div>
    </form>
    <div class="text-center pt-3">
        <a href="/seconnecter">Connecter vous ici, si vous avez déjà un compte.</a>
    </div>
</div>
